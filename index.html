YPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invest with Elon Musk</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f2f2f2;
        }
        .container {
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h1>Invest in the Future with Elon Musk</h1>
                <p>Submit your project for consideration:</p>
                <form action="https://formspree.io/f/mnqwywja" method="POST">
                    <div class="form-group">
                        <label for="projectName">Project Name:</label>
                        <input type="text" class="form-control" id="projectName" placeholder="Enter project name">
                    </div>
                    <div class="form-group">
                        <label for="projectDescription">Project Description:</label>
                        <textarea class="form-control" id="projectDescription" rows="3" placeholder="Enter project description"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="contactEmail">Contact Email:</label>
                        <input type="email" class="form-control" id="contactEmail" placeholder="Enter contact email">
                    </div>
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
                <p>Alternatively, you can contact us directly:</p>
                <p>Email: <a href="mailto:invest@elonmusk.com">invest@elonmusk.com</a></p>
                <p>Phone: +1 (555) 123-4567</p>
            </div>
        </div>
    </div>
</body>
</html>
